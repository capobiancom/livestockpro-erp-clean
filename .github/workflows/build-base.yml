name: Build PHP Base Image

# Rebuild base image only when PHP extensions or composer dependencies change.
# This eliminates bcmath compilation (~60-346s) from every app deploy.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.base'
      - 'composer.json'
      - 'composer.lock'
  workflow_dispatch: {}  # Allow manual rebuild

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/erp-php-base

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:php8.2-bcmath
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=PHP base with bcmath for LivestockPro ERP
