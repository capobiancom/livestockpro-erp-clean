services:
  erp-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vacaliza-erp-standalone:latest
    container_name: erp-app
    restart: always
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=erp-db
      - DB_PORT=3306
      - DB_DATABASE=vacaliza
      - DB_USERNAME=coolify
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=erp-redis
    depends_on:
      - erp-db
      - erp-redis
    volumes:
      - .:/var/www/html
    networks:
      - erp-network

  erp-db:
    image: mysql:8.0
    container_name: erp-db
    restart: always
    environment:
      - MYSQL_DATABASE=vacaliza
      - MYSQL_USER=coolify
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - erp-db-data:/var/lib/mysql
    networks:
      - erp-network

  erp-redis:
    image: redis:alpine
    container_name: erp-redis
    restart: always
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  erp-db-data:
